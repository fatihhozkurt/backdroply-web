<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | &Ccedil;erez Politikas&#305;</title>

    <meta name="robots" content="index,follow" />
    <link id="canonical-link" rel="canonical" href="https://backdroply.com/legal/cookies.html?lang=tr" />

    <link rel="alternate" hreflang="x-default" href="https://backdroply.com/legal/cookies.html" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 920px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const pages = {
          tr: {
            title: "Backdroply | \u00c7erez Politikas\u0131",
            description:
              "Backdroply \u00e7erez politikas\u0131: zorunlu, analitik, i\u015flevsel ve pazarlama \u00e7erezleri ile tercih y\u00f6netimi.",
            html: `
              <h1>&Ccedil;erez Politikas\u0131</h1>
              <p class="meta">Son g\u00fcncelleme: 14 Mart 2026</p>
              <p>Backdroply, hizmetin g\u00fcvenli ve tutarl\u0131 \u00e7al\u0131\u015fmas\u0131 i\u00e7in zorunlu \u00e7erezler kullan\u0131r. A\u00e7\u0131k r\u0131za do\u011frultusunda analitik, i\u015flevsel ve pazarlama \u00e7erezleri de etkinle\u015ftirilebilir.</p>

              <h2>1. &Ccedil;erez Kategorileri</h2>
              <ul>
                <li><strong>Zorunlu:</strong> Kimlik do\u011frulama, g\u00fcvenlik ve temel oturum y\u00f6netimi.</li>
                <li><strong>Analitik:</strong> Trafik \u00f6l\u00e7\u00fcm\u00fc, performans izleme ve hata analizi.</li>
                <li><strong>\u0130\u015flevsel:</strong> Dil ve kullan\u0131c\u0131 tercihlerini hat\u0131rlama.</li>
                <li><strong>Pazarlama:</strong> Kampanya \u00f6l\u00e7\u00fcm\u00fc ve hedefleme.</li>
              </ul>

              <h2>2. Tercih Y\u00f6netimi</h2>
              <p>&Ccedil;erez tercihlerini uygulamadaki <em>&Ccedil;erez tercihleri</em> panelinden istedi\u011fin zaman g\u00fcncelleyebilirsin. Zorunlu \u00e7erezler devre d\u0131\u015f\u0131 b\u0131rak\u0131lamaz.</p>

              <h2>3. Hukuki Dayanak</h2>
              <p>Zorunlu \u00e7erezler me\u015fru menfaat kapsam\u0131nda i\u015flenir. Zorunlu olmayan \u00e7erezler yaln\u0131zca a\u00e7\u0131k r\u0131za ile etkinle\u015fir.</p>

              <h2>4. \u0130lgili Metinler</h2>
              <p><a href="/legal/privacy.html?lang=tr">Gizlilik Politikas\u0131</a> ve <a href="/legal/terms.html?lang=tr">Kullan\u0131m Ko\u015fullar\u0131</a> metinlerini inceleyebilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Cookie Policy",
            description:
              "Backdroply cookie policy covering essential, analytics, functional and marketing cookie categories.",
            html: `
              <h1>Cookie Policy</h1>
              <p class="meta">Last updated: March 14, 2026</p>
              <p>Backdroply uses essential cookies to keep the service secure and functional. Analytics, functional and marketing cookies can be enabled based on consent.</p>

              <h2>1. Cookie Categories</h2>
              <ul>
                <li><strong>Essential:</strong> Authentication, security and core session handling.</li>
                <li><strong>Analytics:</strong> Traffic measurement, performance monitoring and error analysis.</li>
                <li><strong>Functional:</strong> Remembering language and user preferences.</li>
                <li><strong>Marketing:</strong> Campaign measurement and targeting.</li>
              </ul>

              <h2>2. Preference Management</h2>
              <p>You can update your cookie preferences at any time from the in-app <em>Cookie preferences</em> panel. Essential cookies cannot be disabled.</p>

              <h2>3. Legal Basis</h2>
              <p>Essential cookies are processed under legitimate interest. Non-essential cookies are enabled only with explicit consent.</p>

              <h2>4. Related Documents</h2>
              <p>Please review the <a href="/legal/privacy.html?lang=en">Privacy Policy</a> and <a href="/legal/terms.html?lang=en">Terms of Use</a>.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("meta-description").setAttribute("content", selected.description);
        document.getElementById("canonical-link").setAttribute(
          "href",
          `https://backdroply.com/legal/cookies.html?lang=${lang}`
        );
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
