<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | Çerez Politikası</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 900px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const pages = {
          tr: {
            title: "Backdroply | Çerez Politikası",
            html: `
              <h1>Çerez Politikası</h1>
              <p class="meta">Son güncelleme: 12 Mart 2026</p>
              <p>Backdroply, hizmetin güvenli ve tutarlı çalışması için zorunlu çerezler kullanır. Açık rızan doğrultusunda analitik, işlevsel ve pazarlama çerezleri de kullanılabilir.</p>
              <h2>1. Çerez Kategorileri</h2>
              <ul>
                <li><strong>Zorunlu:</strong> Oturum güvenliği, CSRF koruması, kimlik doğrulama ve temel fonksiyonlar için gereklidir.</li>
                <li><strong>Analitik:</strong> Ürün performansı, hata analizi ve kullanım ölçümü için kullanılır.</li>
                <li><strong>İşlevsel:</strong> Dil, kullanıcı arayüzü ve tercih ayarlarını hatırlamak için kullanılır.</li>
                <li><strong>Pazarlama:</strong> Reklam ve kampanya performans analizi için kullanılabilir.</li>
              </ul>
              <h2>2. Hukuki Dayanak</h2>
              <p>Zorunlu çerezler meşru menfaat kapsamında işlenir. Zorunlu olmayan çerezler yalnızca açık rızan ile etkinleşir.</p>
              <h2>3. Tercih Yönetimi</h2>
              <p>Çerez tercihlerini uygulamadaki <em>Çerez tercihleri</em> butonundan dilediğin zaman güncelleyebilirsin. Zorunlu çerezler devre dışı bırakılamaz.</p>
              <h2>4. Saklama Süresi</h2>
              <p>Çerezler amaçlarına göre oturum süresince veya sınırlı bir süre boyunca saklanır. Süresi dolan kayıtlar otomatik temizlenir.</p>
              <h2>5. İlgili Metinler</h2>
              <p>Ek bilgi için <a href="/legal/privacy.html?lang=tr">Gizlilik Politikası</a> ve <a href="/legal/terms.html?lang=tr">Kullanım Koşulları</a> metinlerini inceleyebilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Cookie Policy",
            html: `
              <h1>Cookie Policy</h1>
              <p class="meta">Last updated: March 12, 2026</p>
              <p>Backdroply uses essential cookies to operate the service securely and consistently. Analytics, functional and marketing cookies may be enabled with your consent.</p>
              <h2>1. Cookie Categories</h2>
              <ul>
                <li><strong>Essential:</strong> Required for session security, CSRF protection, authentication and core functions.</li>
                <li><strong>Analytics:</strong> Used for product performance, error analysis and usage measurement.</li>
                <li><strong>Functional:</strong> Used to remember language, interface and preference settings.</li>
                <li><strong>Marketing:</strong> May be used for advertising and campaign performance analytics.</li>
              </ul>
              <h2>2. Legal Basis</h2>
              <p>Essential cookies are processed under legitimate interest. Non-essential cookies are only enabled based on your explicit consent.</p>
              <h2>3. Preference Management</h2>
              <p>You can update your cookie preferences at any time from the <em>Cookie preferences</em> control in the app. Essential cookies cannot be disabled.</p>
              <h2>4. Retention Period</h2>
              <p>Cookies are retained for session duration or limited periods depending on purpose. Expired records are automatically purged.</p>
              <h2>5. Related Documents</h2>
              <p>For more details, review the <a href="/legal/privacy.html?lang=en">Privacy Policy</a> and <a href="/legal/terms.html?lang=en">Terms of Use</a>.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
