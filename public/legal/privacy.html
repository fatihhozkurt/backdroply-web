<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | Gizlilik Politikas&#305;</title>
    <meta
      id="meta-description"
      name="description"
      content="Backdroply gizlilik politikas&#305;: i&#351;lenen veriler, saklama s&uuml;resi, veri sahibi haklar&#305; ve ileti&#351;im kanallar&#305;."
    />
    <meta name="robots" content="index,follow" />
    <link id="canonical-link" rel="canonical" href="https://backdroply.com/legal/privacy.html?lang=tr" />
    <link rel="alternate" hreflang="tr" href="https://backdroply.com/legal/privacy.html?lang=tr" />
    <link rel="alternate" hreflang="en" href="https://backdroply.com/legal/privacy.html?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://backdroply.com/legal/privacy.html" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 920px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const pages = {
          tr: {
            title: "Backdroply | Gizlilik Politikas\u0131",
            description:
              "Backdroply gizlilik politikas\u0131: i\u015flenen veriler, saklama s\u00fcresi, veri sahibi haklar\u0131 ve ileti\u015fim kanallar\u0131.",
            html: `
              <h1>Gizlilik Politikas\u0131</h1>
              <p class="meta">Son g\u00fcncelleme: 14 Mart 2026</p>
              <p>Bu metin, Backdroply hizmetinde i\u015flenen ki\u015fisel verilerin hangi ama\u00e7larla kullan\u0131ld\u0131\u011f\u0131n\u0131, ne kadar s\u00fcre sakland\u0131\u011f\u0131n\u0131 ve kullan\u0131c\u0131 haklar\u0131n\u0131n nas\u0131l kullan\u0131labilece\u011fini \u00f6zetler.</p>

              <h2>1. \u0130\u015flenen Veri Kategorileri</h2>
              <ul>
                <li>Google ile giri\u015f kapsam\u0131nda kimlik do\u011frulama i\u00e7in gerekli temel profil verileri.</li>
                <li>Y\u00fcklenen medya dosyalar\u0131, i\u015fleme parametreleri ve \u00fcretilen \u00e7\u0131kt\u0131 dosyalar\u0131.</li>
                <li>\u0130\u015flem ge\u00e7mi\u015fi, token t\u00fcketimi ve iste\u011fe ba\u011fl\u0131 My Media kay\u0131tlar\u0131.</li>
                <li>G\u00fcvenlik loglar\u0131, h\u0131z s\u0131n\u0131rlama kay\u0131tlar\u0131 ve webhook do\u011frulama kay\u0131tlar\u0131.</li>
              </ul>

              <h2>2. \u0130\u015fleme Ama\u00e7lar\u0131</h2>
              <ul>
                <li>Arka plan kald\u0131rma hizmetini sunmak ve \u00e7\u0131kt\u0131 \u00fcretmek.</li>
                <li>Hizmet g\u00fcvenli\u011fini sa\u011flamak, k\u00f6t\u00fcye kullan\u0131m\u0131 \u00f6nlemek.</li>
                <li>\u00d6deme do\u011frulama, token y\u00fckleme ve denetim s\u00fcre\u00e7lerini y\u00fcr\u00fctmek.</li>
                <li>A\u00e7\u0131k r\u0131za varsa analitik \u00f6l\u00e7\u00fcm ve \u00fcr\u00fcn iyile\u015ftirme yapmak.</li>
              </ul>

              <h2>3. Saklama ve Silme</h2>
              <p>My Media \u00f6zelli\u011fi a\u00e7\u0131ksa en fazla 10 \u00e7\u0131kt\u0131 tutulur; yeni \u00e7\u0131kt\u0131 geldi\u011finde en eski kay\u0131t otomatik silinir. Hesap silme talebinde kimli\u011fe ba\u011fl\u0131 eri\u015fim kapat\u0131l\u0131r ve veri minimizasyonu ilkesiyle temizleme i\u015flemleri uygulan\u0131r.</p>

              <h2>4. Veri Sahibi Ba\u015fvuru Haklar\u0131 (KVKK)</h2>
              <p>6698 say\u0131l\u0131 Kanun kapsam\u0131ndaki ba\u015fvuru, d\u00fczeltme, silme ve bilgi talepleri i\u00e7in <a href="mailto:kvkk@backdroply.app">kvkk@backdroply.app</a> adresine yazabilirsin. Genel destek i\u00e7in <a href="mailto:support@backdroply.app">support@backdroply.app</a> veya <a href="/contact">Iletisim</a> sayfas\u0131n\u0131 kullanabilirsin.</p>

              <h2>5. \u0130lgili Metinler</h2>
              <p><a href="/legal/cookies.html?lang=tr">&Ccedil;erez Politikas\u0131</a> ve <a href="/legal/terms.html?lang=tr">Kullan\u0131m Ko\u015fullar\u0131</a> metinlerini de inceleyebilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Privacy Policy",
            description:
              "Backdroply privacy policy covering data categories, processing purposes, retention period and data subject requests.",
            html: `
              <h1>Privacy Policy</h1>
              <p class="meta">Last updated: March 14, 2026</p>
              <p>This policy summarizes what personal data is processed by Backdroply, why it is processed, how long it is retained, and how users can exercise their rights.</p>

              <h2>1. Data Categories</h2>
              <ul>
                <li>Basic profile data required for authentication via Google sign-in.</li>
                <li>Uploaded media files, processing parameters and output files.</li>
                <li>Processing history, token consumption and optional My Media records.</li>
                <li>Security logs, rate-limit records and webhook verification logs.</li>
              </ul>

              <h2>2. Processing Purposes</h2>
              <ul>
                <li>To provide background removal and generate outputs.</li>
                <li>To ensure service security and prevent abuse.</li>
                <li>To verify payments, credit tokens and maintain auditability.</li>
                <li>To run analytics and product improvements based on consent.</li>
              </ul>

              <h2>3. Retention and Deletion</h2>
              <p>If My Media is enabled, up to 10 outputs are retained and the oldest entry is removed first. For account deletion requests, identity-bound access is terminated and cleanup is performed under data minimization principles.</p>

              <h2>4. Data Subject Requests</h2>
              <p>For access, correction or deletion requests, contact <a href="mailto:kvkk@backdroply.app">kvkk@backdroply.app</a>. For support requests, use <a href="mailto:support@backdroply.app">support@backdroply.app</a> or the <a href="/contact">Contact</a> page.</p>

              <h2>5. Related Documents</h2>
              <p>Please also review the <a href="/legal/cookies.html?lang=en">Cookie Policy</a> and <a href="/legal/terms.html?lang=en">Terms of Use</a>.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("meta-description").setAttribute("content", selected.description);
        document.getElementById("canonical-link").setAttribute(
          "href",
          `https://backdroply.com/legal/privacy.html?lang=${lang}`
        );
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
