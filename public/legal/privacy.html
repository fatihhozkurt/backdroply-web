<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | Gizlilik Politikası</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 920px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const supportEmail = "support@backdroply.app";
        const kvkkEmail = "kvkk@backdroply.app";

        const pages = {
          tr: {
            title: "Backdroply | Gizlilik Politikası",
            html: `
              <h1>Gizlilik Politikası</h1>
              <p class="meta">Son güncelleme: 13 Mart 2026</p>
              <p>Bu politika, Backdroply üzerinde işlenen kişisel verilerin hangi amaçlarla kullanıldığını, ne kadar süre saklandığını ve kullanıcı haklarının nasıl kullanılabileceğini özetler.</p>

              <h2>1. İşlenen Veri Türleri</h2>
              <ul>
                <li>Google ile giriş kapsamında kimlik doğrulama için gerekli temel profil verileri.</li>
                <li>Yüklenen medya dosyaları, işleme parametreleri ve işlem çıktıları.</li>
                <li>İşlem geçmişi, token tüketimi ve tercihe bağlı My Media kayıtları.</li>
                <li>Güvenlik logları, hız sınırlama kayıtları ve webhook doğrulama kayıtları.</li>
              </ul>

              <h2>2. İşleme Amaçları</h2>
              <ul>
                <li>Arka plan kaldırma hizmetini sunmak ve çıktı üretmek.</li>
                <li>Hizmet güvenliğini sağlamak, kötüye kullanımı önlemek.</li>
                <li>Ödeme doğrulama, token yükleme ve denetim süreçlerini yürütmek.</li>
                <li>Açık rıza halinde analitik ölçüm ve ürün iyileştirme yapmak.</li>
              </ul>

              <h2>3. Saklama ve Silme</h2>
              <p>My Media özelliği açıksa en fazla 10 çıktı tutulur; yeni kayıt geldiğinde en eski kayıt silinir. Hesap silme talebinde kimliğe bağlı erişim kapatılır ve veri minimizasyonu ilkesiyle temizleme işlemleri uygulanır.</p>

              <h2>4. Veri Aktarımı</h2>
              <p>Kimlik doğrulama, ödeme, e-posta ve depolama altyapılarında sözleşmeli teknik sağlayıcılar kullanılabilir. Aktarımlar yalnızca hizmet sunumu ve güvenlik amacıyla sınırlıdır.</p>

              <h2>5. Veri Sahibi Başvuru Hakkı (KVKK)</h2>
              <p>6698 sayılı Kanun kapsamında başvuru, düzeltme, silme ve bilgi talebi için <a href="mailto:${kvkkEmail}">${kvkkEmail}</a> adresini kullanabilirsin. Destek talepleri için <a href="mailto:${supportEmail}">${supportEmail}</a> ve uygulamadaki <a href="/contact">İletişim</a> formu aktiftir.</p>

              <h2>6. İlgili Metinler</h2>
              <p><a href="/legal/cookies.html?lang=tr">Çerez Politikası</a> ve <a href="/legal/terms.html?lang=tr">Kullanım Koşulları</a> metinlerini de inceleyebilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Privacy Policy",
            html: `
              <h1>Privacy Policy</h1>
              <p class="meta">Last updated: March 13, 2026</p>
              <p>This policy summarizes what personal data is processed by Backdroply, why it is processed, how long it is retained, and how users can exercise their rights.</p>

              <h2>1. Data Categories</h2>
              <ul>
                <li>Basic profile data required for authentication via Google sign-in.</li>
                <li>Uploaded media files, processing parameters and output files.</li>
                <li>Processing history, token consumption and optional My Media records.</li>
                <li>Security logs, rate-limit records and webhook verification logs.</li>
              </ul>

              <h2>2. Processing Purposes</h2>
              <ul>
                <li>To provide background removal and generate outputs.</li>
                <li>To ensure service security and prevent abuse.</li>
                <li>To verify payments, credit tokens and maintain auditability.</li>
                <li>To run analytics and product improvements based on consent.</li>
              </ul>

              <h2>3. Retention and Deletion</h2>
              <p>If My Media is enabled, up to 10 outputs are retained and the oldest entry is evicted first. For account deletion requests, identity-bound access is terminated and cleanup is performed under data minimization principles.</p>

              <h2>4. Data Sharing</h2>
              <p>Identity, payment, email and storage infrastructure may involve contracted technical processors. Transfers are limited to service delivery and security purposes.</p>

              <h2>5. Data Subject Requests</h2>
              <p>For data access, correction or deletion requests, contact <a href="mailto:${kvkkEmail}">${kvkkEmail}</a>. For support requests, use <a href="mailto:${supportEmail}">${supportEmail}</a> or the in-app <a href="/contact">Contact</a> form.</p>

              <h2>6. Related Documents</h2>
              <p>Please also review the <a href="/legal/cookies.html?lang=en">Cookie Policy</a> and <a href="/legal/terms.html?lang=en">Terms of Use</a>.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
