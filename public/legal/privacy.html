<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | Gizlilik Politikası</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 900px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const pages = {
          tr: {
            title: "Backdroply | Gizlilik Politikası",
            html: `
              <h1>Gizlilik Politikası</h1>
              <p class="meta">Son güncelleme: 12 Mart 2026</p>
              <p>Bu metin, Backdroply üzerinde işlenen kişisel verilerin hangi amaçlarla kullanıldığını, ne kadar süre saklandığını ve kullanıcı haklarının nasıl kullanılabileceğini özetler.</p>
              <h2>1. İşlenen Veri Türleri</h2>
              <ul>
                <li>Google ile giriş kapsamında kimlik doğrulama için gerekli temel profil verileri.</li>
                <li>Yüklediğin medya dosyaları ve işleme parametreleri.</li>
                <li>İşlem geçmişi, token tüketimi ve tercihe bağlı My Media kayıtları.</li>
                <li>Güvenlik logları, rate-limit kayıtları ve webhook doğrulama verileri.</li>
              </ul>
              <h2>2. İşleme Amaçları</h2>
              <ul>
                <li>Arka plan kaldırma hizmetini sunmak ve sonuç üretmek.</li>
                <li>Hizmet güvenliğini sağlamak, kötüye kullanımı önlemek.</li>
                <li>Ödeme doğrulama, token yükleme ve işlem denetimi yürütmek.</li>
                <li>Açık rıza halinde analiz ve ürün geliştirme ölçümü yapmak.</li>
              </ul>
              <h2>3. Saklama ve Silme</h2>
              <p>My Media özelliği açıksa en fazla 10 çıktı tutulur; yeni kayıt geldiğinde en eski kayıt silinir. Hesabını sildiğinde kimliğe bağlı erişim sonlandırılır.</p>
              <h2>4. Aktarım ve Üçüncü Taraflar</h2>
              <p>Kimlik doğrulama, ödeme, e-posta ve depolama altyapılarında sözleşmeli teknik sağlayıcılar kullanılabilir. Bu aktarımlar hizmetin sunumu ve güvenlik amacıyla sınırlıdır.</p>
              <h2>5. Kullanıcı Hakları</h2>
              <p>Veri işleme faaliyetleri hakkında bilgi talep etme, düzeltme/silme isteme ve çerez tercihlerini güncelleme hakların bulunur.</p>
              <h2>6. İlgili Metinler</h2>
              <p><a href="/legal/cookies.html?lang=tr">Çerez Politikası</a> ve <a href="/legal/terms.html?lang=tr">Kullanım Koşulları</a> metinlerini de inceleyebilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Privacy Policy",
            html: `
              <h1>Privacy Policy</h1>
              <p class="meta">Last updated: March 12, 2026</p>
              <p>This policy summarizes how Backdroply processes personal data, for what purposes it is used, how long it is retained, and how users can exercise their rights.</p>
              <h2>1. Data Categories</h2>
              <ul>
                <li>Basic profile data required for authentication via Google sign-in.</li>
                <li>Uploaded media files and processing parameters.</li>
                <li>Processing history, token consumption and optional My Media records.</li>
                <li>Security logs, rate-limit records and webhook verification data.</li>
              </ul>
              <h2>2. Processing Purposes</h2>
              <ul>
                <li>To provide background removal and generate outputs.</li>
                <li>To ensure service security and prevent abuse.</li>
                <li>To verify payments, load tokens and maintain auditability.</li>
                <li>To run analytics and product improvement measurements with consent.</li>
              </ul>
              <h2>3. Retention and Deletion</h2>
              <p>If My Media is enabled, up to 10 outputs are retained and the oldest entry is evicted first. When your account is deleted, identity-bound access is terminated.</p>
              <h2>4. Sharing and Processors</h2>
              <p>Identity, payment, email and storage infrastructure may involve contracted technical providers. Transfers are limited to service delivery and security purposes.</p>
              <h2>5. User Rights</h2>
              <p>You may request information about processing, request correction/deletion, and update cookie preferences at any time.</p>
              <h2>6. Related Documents</h2>
              <p>Please also review the <a href="/legal/cookies.html?lang=en">Cookie Policy</a> and <a href="/legal/terms.html?lang=en">Terms of Use</a>.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
