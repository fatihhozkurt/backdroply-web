<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backdroply | Kullan&#305;m Ko&#351;ullar&#305;</title>
    <meta
      id="meta-description"
      name="description"
      content="Backdroply kullan&#305;m ko&#351;ullar&#305;: hizmet kapsam&#305;, hesap kullan&#305;m&#305;, i&ccedil;erik sorumlulu&#287;u, &ouml;deme, iade ve yasal s&#305;n&#305;rlamalar."
    />
    <meta name="robots" content="index,follow" />
    <link id="canonical-link" rel="canonical" href="https://backdroply.com/legal/terms.html?lang=tr" />
    <link rel="alternate" hreflang="tr" href="https://backdroply.com/legal/terms.html?lang=tr" />
    <link rel="alternate" hreflang="en" href="https://backdroply.com/legal/terms.html?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://backdroply.com/legal/terms.html" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.24);
        --text: #dbeafe;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 10% -10%, rgba(34, 211, 238, 0.15), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          var(--bg);
      }
      main {
        max-width: 920px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }
      h1, h2 { margin: 0 0 14px; }
      h1 { font-size: 30px; }
      h2 { margin-top: 22px; font-size: 18px; }
      p, li { color: var(--muted); line-height: 1.65; }
      ul { margin: 10px 0 0 18px; padding: 0; }
      a { color: #7dd3fc; }
      .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script>
      (function () {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        const storedLang = localStorage.getItem("backdroply_lang") || localStorage.getItem("clipcut_lang");
        const lang = (queryLang || storedLang || "tr").toLowerCase().startsWith("en") ? "en" : "tr";
        localStorage.setItem("backdroply_lang", lang);
        localStorage.setItem("clipcut_lang", lang);
        document.documentElement.lang = lang;

        const pages = {
          tr: {
            title: "Backdroply | Kullan\u0131m Ko\u015fullar\u0131",
            description:
              "Backdroply kullan\u0131m ko\u015fullar\u0131: hizmet kapsam\u0131, hesap sorumluluklar\u0131, i\u00e7erik haklar\u0131 ve \u00f6deme ak\u0131\u015f\u0131.",
            html: `
              <h1>Kullan\u0131m Ko\u015fullar\u0131</h1>
              <p class="meta">Son g\u00fcncelleme: 14 Mart 2026</p>
              <p>Backdroply hizmetini kullanarak bu ko\u015fullar\u0131 kabul etmi\u015f olursun. Bu metin, \u00fcr\u00fcn kullan\u0131m\u0131na ili\u015fkin genel \u00e7er\u00e7eveyi a\u00e7\u0131klar.</p>

              <h2>1. Hizmet Kapsam\u0131</h2>
              <p>Backdroply; g\u00f6rsel/video arka plan ayr\u0131\u015ft\u0131rma, \u00e7\u0131kt\u0131 \u00fcretimi, token bazl\u0131 kullan\u0131m, ge\u00e7mi\u015f ve iste\u011fe ba\u011fl\u0131 medya saklama \u00f6zellikleri sunar.</p>

              <h2>2. Hesap ve Erisim</h2>
              <ul>
                <li>Kimlik do\u011frulama Google ile yap\u0131l\u0131r.</li>
                <li>Hesap g\u00fcvenli\u011fini korumak kullan\u0131c\u0131n\u0131n sorumlulu\u011fundad\u0131r.</li>
                <li>Hesap silme i\u015flemi uygulama i\u00e7inden ba\u015flat\u0131labilir.</li>
              </ul>

              <h2>3. Icerik ve Lisans Sorumlulugu</h2>
              <ul>
                <li>Y\u00fckledi\u011fin i\u00e7erik \u00fczerinde gerekli kullan\u0131m haklar\u0131na sahip olmal\u0131s\u0131n.</li>
                <li>Telif, marka veya \u00fc\u00e7\u00fcnc\u00fc taraf haklar\u0131n\u0131 ihlal eden i\u00e7erikler y\u00fcklenmemelidir.</li>
              </ul>

              <h2>4. Ucretlendirme ve Planlar</h2>
              <p>Plan, token ve fiyat bilgileri sat\u0131n alma ekran\u0131nda g\u00f6sterilir. \u00d6deme sa\u011flay\u0131c\u0131 entegrasyonlar\u0131 teknik olarak sa\u011flansa da resmi faturalama i\u00e7in ge\u00e7erli mevzuat ve sirketlesme y\u00fck\u00fcml\u00fcl\u00fckleri kullan\u0131c\u0131/sat\u0131c\u0131 sorumlulu\u011fundad\u0131r.</p>

              <h2>5. Sorumluluk Siniri</h2>
              <p>Hizmet, mevcut haliyle sunulur. Teknik kesinti, \u00fc\u00e7\u00fcnc\u00fc taraf servis ar\u0131zas\u0131 veya kullan\u0131c\u0131 kaynakl\u0131 hatalardan do\u011fan dolayl\u0131 zararlarda yasal s\u0131n\u0131rlar dahilinde sorumluluk uygulan\u0131r.</p>

              <h2>6. Iletisim</h2>
              <p>Destek talepleri i\u00e7in <a href="mailto:support@backdroply.app">support@backdroply.app</a> veya <a href="/contact">Iletisim</a> sayfas\u0131n\u0131 kullanabilirsin.</p>
            `
          },
          en: {
            title: "Backdroply | Terms of Use",
            description:
              "Backdroply terms of use covering service scope, account responsibilities, content rights and payment flow.",
            html: `
              <h1>Terms of Use</h1>
              <p class="meta">Last updated: March 14, 2026</p>
              <p>By using Backdroply, you agree to these terms. This page provides the high-level framework for using the product.</p>

              <h2>1. Service Scope</h2>
              <p>Backdroply provides image/video background removal, output generation, token-based usage, history, and optional media retention.</p>

              <h2>2. Account and Access</h2>
              <ul>
                <li>Authentication is handled via Google sign-in.</li>
                <li>You are responsible for protecting your account security.</li>
                <li>Account deletion can be initiated in-app.</li>
              </ul>

              <h2>3. Content and Licensing Responsibility</h2>
              <ul>
                <li>You must hold the necessary rights for uploaded content.</li>
                <li>Content that violates copyright, trademark, or third-party rights is prohibited.</li>
              </ul>

              <h2>4. Pricing and Plans</h2>
              <p>Plan, token and price details are shown on the purchase screen. Payment integrations may be available technically, while official invoicing and tax compliance remain subject to applicable regulations and seller obligations.</p>

              <h2>5. Limitation of Liability</h2>
              <p>The service is provided as-is. Liability for indirect damages caused by technical outages, third-party failures, or user-side misconfiguration is limited by applicable law.</p>

              <h2>6. Contact</h2>
              <p>For support, use <a href="mailto:support@backdroply.app">support@backdroply.app</a> or the <a href="/contact">Contact</a> page.</p>
            `
          }
        };

        const selected = pages[lang];
        document.title = selected.title;
        document.getElementById("meta-description").setAttribute("content", selected.description);
        document.getElementById("canonical-link").setAttribute(
          "href",
          `https://backdroply.com/legal/terms.html?lang=${lang}`
        );
        document.getElementById("content").innerHTML = selected.html;
      })();
    </script>
  </body>
</html>
